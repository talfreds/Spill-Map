name: spill_flutter
description: Frontend shell for Spill built with Flutter.
publish_to: none

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.9.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^8.1.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  firebase_storage: ^12.4.10
  image_picker: ^1.2.0
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
